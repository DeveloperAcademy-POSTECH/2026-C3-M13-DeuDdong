<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>줍줍</title>
  <style>
    :root {
      color: #18130f;
      background: #fff7ec;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px;
    }

    main {
      width: min(720px, 100%);
      padding: 40px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 24px 80px rgba(94, 57, 19, 0.16);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(34px, 8vw, 64px);
      line-height: 1;
      letter-spacing: -0.06em;
    }

    p {
      margin: 0 0 28px;
      color: #6f6258;
      font-size: 17px;
      line-height: 1.7;
    }

    a {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 14px 20px;
      background: #ff6a1a;
      color: white;
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>줍줍</h1>
    <p>대화 속 긍정 표현을 감정 구슬로 시각화하고 수집하는 iOS 앱입니다.</p>
    <a href="./privacy/">개인정보 처리방침 보기</a>
  </main>
</body>
</html>
